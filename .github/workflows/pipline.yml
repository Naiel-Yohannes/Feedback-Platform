name: New pipline
on: push

jobs:
  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        working-directory: Frontend
        run: npm install

      - name: Run tests
        run: npm test

      - name: Build app
        run: npm run build

  backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        working-directory: Backend
        run: npm install

      - name: Run tests
        run: npm test

      - name: Build app
        run: npm run build